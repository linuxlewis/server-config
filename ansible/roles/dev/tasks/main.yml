---
- name: Install development packages (RedHat)
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
      - nodejs
      - gcc
      - make
      - tmux
    state: present
  when: ansible_os_family == "RedHat"

- name: Install development packages (Debian)
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - nodejs
      - npm
      - build-essential
      - tmux
    state: present
  when: ansible_os_family == "Debian"

- name: Install Claude Code CLI
  ansible.builtin.shell: |
    curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: /usr/local/bin/claude
  become_user: "{{ username }}"

- name: Install OpenClaw CLI
  community.general.npm:
    name: openclaw
    global: true
    state: latest

- name: Install OpenClaw gateway daemon with Tailscale Serve
  ansible.builtin.command:
    cmd: openclaw gateway install --tailscale serve
  args:
    creates: /etc/systemd/system/openclaw-gateway.service
  become_user: "{{ username }}"

- name: Install OpenAI Codex CLI
  community.general.npm:
    name: "@openai/codex"
    global: true
    state: latest

- name: Create dev workspace directories
  ansible.builtin.file:
    path: "/home/{{ username }}/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - projects
    - .config

- name: Create code-server data directory
  ansible.builtin.file:
    path: /opt/services/code-server
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"

