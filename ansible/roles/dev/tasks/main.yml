---
- name: Install development packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - nodejs
      - npm
      - golang
      - build-essential
      - tmux
    state: present

- name: Add Google Chrome repo key
  ansible.builtin.apt_key:
    url: https://dl.google.com/linux/linux_signing_key.pub
    state: present

- name: Add Google Chrome repo
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main"
    state: present
    filename: google-chrome

- name: Install Google Chrome
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true

- name: Install or update uv (Python package manager)
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  become_user: "{{ username }}"
  register: uv_install
  changed_when: "'already installed' not in uv_install.stderr"

- name: Install or update Claude Code CLI
  ansible.builtin.shell: |
    curl -fsSL https://claude.ai/install.sh | bash
  become_user: "{{ username }}"
  register: claude_install
  changed_when: "'already installed' not in claude_install.stderr"

- name: Install OpenClaw CLI
  community.general.npm:
    name: "{{ item }}"
    global: true
    state: latest
  loop:
    - openclaw
    - "@openai/codex"
    - "@bitwarden/cli"

- name: Install OpenClaw gateway daemon with Tailscale Serve
  ansible.builtin.command:
    cmd: openclaw gateway install --tailscale serve
  args:
    creates: /etc/systemd/system/openclaw-gateway.service
  become_user: "{{ username }}"

- name: Create dev workspace directories
  ansible.builtin.file:
    path: "/home/{{ username }}/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - projects
    - .config
