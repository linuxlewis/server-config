---
- name: Add package repository keys
  ansible.builtin.apt_key:
    url: "{{ item }}"
    state: present
  loop:
    - "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
    - https://pkg.cloudflare.com/cloudflare-main.gpg

- name: Add package repositories
  ansible.builtin.apt_repository:
    repo: "{{ item }}"
    state: present
  loop:
    - "deb https://pkgs.tailscale.com/stable/debian {{ ansible_distribution_release }} main"
    - "deb https://pkg.cloudflare.com/cloudflared {{ ansible_distribution_release }} main"

- name: Install networking packages
  ansible.builtin.apt:
    name:
      - tailscale
      - cloudflared
    state: present
    update_cache: true

- name: Enable and start Tailscale
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Connect to Tailscale network
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_authkey }}"
  when: tailscale_authkey | length > 0
  changed_when: false

- name: Configure Tailscale Serve for code-server
  ansible.builtin.command:
    cmd: tailscale serve --bg --https=443 http://localhost:8080
  changed_when: false

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    name: OpenSSH
  when: enable_firewall

- name: Allow Tailscale traffic through UFW
  community.general.ufw:
    rule: allow
    direction: in
    interface: tailscale0
  when: enable_firewall

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
  when: enable_firewall
