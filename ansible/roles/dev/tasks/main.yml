---
- name: Install development packages (RedHat)
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
      - python3-venv
      - nodejs
      - golang
      - gcc
      - make
      - tmux
    state: present
  when: ansible_os_family == "RedHat"

- name: Install development packages (Debian)
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - nodejs
      - npm
      - golang
      - build-essential
      - tmux
    state: present
  when: ansible_os_family == "Debian"

# Google Chrome
- name: Add Google Chrome repo key (RedHat)
  ansible.builtin.rpm_key:
    key: https://dl.google.com/linux/linux_signing_key.pub
    state: present
  when: ansible_os_family == "RedHat"

- name: Add Google Chrome repo (RedHat)
  ansible.builtin.yum_repository:
    name: google-chrome
    description: Google Chrome
    baseurl: https://dl.google.com/linux/chrome/rpm/stable/x86_64
    gpgcheck: true
    gpgkey: https://dl.google.com/linux/linux_signing_key.pub
  when: ansible_os_family == "RedHat"

- name: Install Google Chrome (RedHat)
  ansible.builtin.dnf:
    name: google-chrome-stable
    state: present
  when: ansible_os_family == "RedHat"

- name: Add Google Chrome repo key (Debian)
  ansible.builtin.apt_key:
    url: https://dl.google.com/linux/linux_signing_key.pub
    state: present
  when: ansible_os_family == "Debian"

- name: Add Google Chrome repo (Debian)
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://dl.google.com/linux/chrome/deb/ stable main"
    state: present
    filename: google-chrome
  when: ansible_os_family == "Debian"

- name: Install Google Chrome (Debian)
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install or update uv (Python package manager)
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  become_user: "{{ username }}"
  register: uv_install
  changed_when: "'already installed' not in uv_install.stderr"

- name: Install or update Claude Code CLI
  ansible.builtin.shell: |
    curl -fsSL https://claude.ai/install.sh | bash
  become_user: "{{ username }}"
  register: claude_install
  changed_when: "'already installed' not in claude_install.stderr"

- name: Install OpenClaw CLI
  community.general.npm:
    name: openclaw
    global: true
    state: latest

- name: Install OpenClaw gateway daemon with Tailscale Serve
  ansible.builtin.command:
    cmd: openclaw gateway install --tailscale serve
  args:
    creates: /etc/systemd/system/openclaw-gateway.service
  become_user: "{{ username }}"

- name: Install OpenAI Codex CLI
  community.general.npm:
    name: "@openai/codex"
    global: true
    state: latest

- name: Create dev workspace directories
  ansible.builtin.file:
    path: "/home/{{ username }}/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - projects
    - .config


