name: Ansible CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-ansible:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core ansible-lint

      - name: Ansible syntax check
        working-directory: ansible
        run: ansible-playbook -i inventory.ini server.yml --syntax-check

      - name: Ansible lint
        run: ansible-lint ansible/server.yml
