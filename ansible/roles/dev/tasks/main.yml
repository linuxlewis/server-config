---
- name: Install development packages (RedHat)
  ansible.builtin.dnf:
    name:
      - python3
      - python3-pip
      - nodejs
      - gcc
      - make
    state: present
  when: ansible_os_family == "RedHat"

- name: Install development packages (Debian)
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - nodejs
      - npm
      - build-essential
    state: present
  when: ansible_os_family == "Debian"

- name: Create dev workspace directories
  ansible.builtin.file:
    path: "/home/{{ username }}/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - projects
    - .config

- name: Create code-server data directory
  ansible.builtin.file:
    path: /opt/services/code-server
    state: directory
    owner: "1000"
    group: "1000"
    mode: "0755"
