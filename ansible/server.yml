---
- name: Configure dev server
  hosts: servers
  become: true

  pre_tasks:
    - name: Require Debian hosts
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Debian"
        fail_msg: "This playbook supports Debian only."
        success_msg: "Running on supported Debian host."

  vars:
    username: "{{ lookup('env', 'SERVER_USERNAME') | default('dev', true) }}"
    docker_data_dir: /opt/services
    ci_mode: false
    tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"
    enable_firewall: false

  roles:
    - base
    - role: docker
      when: not ci_mode
    - role: dev
      when: not ci_mode
    - role: networking
      when: not ci_mode
