- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install package repository keys
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ item.dest }}"
    mode: "0644"
  loop:
    - url: "https://pkgs.tailscale.com/stable/debian/{{ ansible_distribution_release }}.noarmor.gpg"
      dest: /etc/apt/keyrings/tailscale.gpg
    - url: https://pkg.cloudflare.com/cloudflare-public-v2.gpg
      dest: /etc/apt/keyrings/cloudflare-public-v2.gpg

- name: Add package repositories
  ansible.builtin.copy:
    dest: "{{ item.dest }}"
    mode: "0644"
    content: "{{ item.repo }}\n"
  loop:
    - dest: /etc/apt/sources.list.d/tailscale.list
      repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/debian {{ ansible_distribution_release }} main"
    - dest: /etc/apt/sources.list.d/cloudflared.list
      repo: "deb [signed-by=/etc/apt/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main"

- name: Install networking packages
  ansible.builtin.apt:
    name:
      - tailscale
      - cloudflared
    state: present
    update_cache: true

- name: Enable and start Tailscale
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started

- name: Connect to Tailscale network
  ansible.builtin.command:
    cmd: "tailscale up --authkey={{ tailscale_authkey }}"
  when: tailscale_authkey | length > 0
  changed_when: false

- name: Enable Tailscale SSH
  ansible.builtin.command:
    cmd: tailscale set --ssh=true
  when: tailscale_authkey | length > 0
  changed_when: false

- name: Configure Tailscale Serve for code-server
  ansible.builtin.command:
    cmd: tailscale serve --bg --https=443 http://localhost:8080
  changed_when: false

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    name: OpenSSH
  when: enable_firewall

- name: Allow Tailscale traffic through UFW
  community.general.ufw:
    rule: allow
    direction: in
    interface: tailscale0
  when: enable_firewall

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
  when: enable_firewall
