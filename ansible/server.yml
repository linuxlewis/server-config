---
- name: Configure dev server
  hosts: servers
  become: true

  vars:
    username: dev
    docker_data_dir: /opt/services
    ci_mode: false
    tailscale_authkey: "{{ lookup('env', 'TAILSCALE_AUTHKEY') }}"

  roles:
    - base
    - role: docker
      when: not ci_mode
    - role: dev
      when: not ci_mode
    - role: networking
      when: not ci_mode
