---
- name: Install Debian development toolchain packages
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - golang
      - build-essential
      - tmux
    state: present

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Install Google Chrome repo key
  ansible.builtin.get_url:
    url: https://dl.google.com/linux/linux_signing_key.pub
    dest: /etc/apt/keyrings/google-chrome.asc
    mode: "0644"

- name: Install NodeSource repo key
  ansible.builtin.get_url:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    dest: /etc/apt/keyrings/nodesource.asc
    mode: "0644"

- name: Add Google Chrome repo
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/google-chrome.asc] https://dl.google.com/linux/chrome/deb/ stable main"
    state: present
    filename: google-chrome

- name: Add NodeSource repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc] https://deb.nodesource.com/node_24.x nodistro main"
    state: present
    filename: nodesource

- name: Install Google Chrome
  ansible.builtin.apt:
    name: google-chrome-stable
    state: present
    update_cache: true

- name: Install Node.js LTS
  ansible.builtin.apt:
    name: nodejs
    state: latest
    update_cache: true

- name: Check installed Node.js version
  ansible.builtin.command: node --version
  register: node_version
  changed_when: false

- name: Require Node.js 22.12 or newer
  ansible.builtin.assert:
    that:
      - "(node_version.stdout | regex_replace('^v', '')) is version('22.12.0', '>=')"
    fail_msg: "Node.js 22.12.0+ is required, found {{ node_version.stdout }}"
    success_msg: "Node.js version is {{ node_version.stdout }}"

- name: Install or update uv (Python package manager)
  ansible.builtin.shell: |
    curl -LsSf https://astral.sh/uv/install.sh | sh
  become_user: "{{ username }}"
  register: uv_install
  changed_when: "'already installed' not in uv_install.stderr"

- name: Install or update Claude Code CLI
  ansible.builtin.shell: |
    curl -fsSL https://claude.ai/install.sh | bash
  become_user: "{{ username }}"
  register: claude_install
  changed_when: "'already installed' not in claude_install.stderr"

- name: Create user npm prefix directories
  ansible.builtin.file:
    path: "/home/{{ username }}/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - .npm-global
    - .npm-global/bin

- name: Configure user npm prefix and PATH
  ansible.builtin.copy:
    dest: "/home/{{ username }}/.npmrc"
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"
    content: |
      prefix=${HOME}/.npm-global

- name: Ensure user PATH includes npm global bin
  ansible.builtin.blockinfile:
    path: "/home/{{ username }}/.profile"
    marker: "# {mark} ANSIBLE MANAGED NPM PATH"
    create: true
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0644"
    block: |
      case ":$PATH:" in
        *":$HOME/.npm-global/bin:"*) ;;
        *) export PATH="$HOME/.npm-global/bin:$PATH" ;;
      esac

- name: Create user workspace directories
  ansible.builtin.file:
    path: "/home/{{ username }}/{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - workspace
    - .config
