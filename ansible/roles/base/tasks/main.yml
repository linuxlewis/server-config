---
- name: Set hostname
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Update all packages
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - git
      - gh
      - tmux
      - htop
      - gpg
      - curl
      - wget
      - vim
      - jq
      - unzip
      - fail2ban
      - ufw
    state: present

- name: Create primary user
  ansible.builtin.user:
    name: "{{ username }}"
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true

- name: Configure SSH
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - regexp: "^#?PasswordAuthentication"
      line: "PasswordAuthentication no"
    - regexp: "^#?PermitRootLogin"
      line: "PermitRootLogin no"
  notify: restart ssh
  when: not ci_mode

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  when: not ci_mode

- name: Disable server-config-update timer
  ansible.builtin.systemd:
    name: server-config-update.timer
    enabled: false
    state: stopped
  failed_when: false
  when: not ci_mode

- name: Remove server-config-update systemd units
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/server-config-update.service
    - /etc/systemd/system/server-config-update.timer
  notify: reload systemd
  when: not ci_mode

- name: Create persistent data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ username }}"
    group: "{{ username }}"
    mode: "0755"
  loop:
    - "{{ docker_data_dir }}"
    - "{{ docker_data_dir }}/code-server"
